name: Backend CI Pipeline

# to run the tests
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Jest Unit Tests
    runs-on: ubuntu-latest

    # all commands run inside backend automatically
    defaults:
      run:
        working-directory: ./backend

    # test across multiple Node versions to ensure stability
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      # 1. Grabs code from the git repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Installs the specific Node.js version
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "./backend/package-lock.json"

      # 3. Securely installs backend dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Executes the Jest test suite
      - name: Run Jest Test Suite
        run: npm test
